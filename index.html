<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/vite.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>智能组队小助手</title>
  <!-- 引入 Font Awesome 图标 -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <!-- 引入 Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 配置 Tailwind 自定义样式 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#409eff',
            navGray: '#999999',
            'tag竞赛': '#67c23a',
            'tag考研': '#e6a23c',
            'tag运动': '#f56c6c',
            textLight: '#999',
          },
          borderRadius: {
            'card': '12px',
            'search': '20px',
            'btn': '8px',
            'nav': '16px',
          }
        },
      }
    }
  </script>
  <style>
    :root {
      --color-primary: #409eff;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      overflow-x: hidden;
      background: #f8f9fa;
    }
    #app {
      height: 100vh;
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
    }
    .page-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      padding: 0 16px;
    }
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding-bottom: 90px;
      display: none;
    }
    .page.active {
      display: block;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 999;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      padding: 1.25rem 1.5rem;
      box-sizing: border-box;
    }
    .nav-item {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .nav-item:active {
      transform: scale(0.95);
    }
    .nav-active {
      color: var(--color-primary) !important;
      font-weight: 600 !important;
    }
    .nav-inactive {
      color: #999999 !important;
      font-weight: 400 !important;
    }
    select, input, textarea {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    }
    .border-l-4 {
      border-left-width: 4px !important;
    }
    .flex-wrap {
      flex-wrap: wrap !important;
    }
    .rounded-card {
      border-radius: 12px !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
